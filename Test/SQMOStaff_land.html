<!-- SQMOStaff_land.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>SQMO Accreditation Portal</title>

    <link rel="stylesheet" href="SQMOStaff_land.css">
</head>

<body>

    <div id="Main_bkgrnd">

        <div id="header">

            <img
                src="XU_header.png"
                alt="XU_Logo"
            >

            <button
                id="addBtn"
                class="log_outbtn"
                style="display:none;"
            >
                + Add Program
            </button>

            <button
                id="adminToggle"
                class="log_outbtn"
            >
                Edit: OFF
            </button>

            <button
                class="log_outbtn"
                onclick="logout()"
            >
                Log out
            </button>

        </div>

        <div class="header">

            <h1>Programs</h1>

            <p>
                Select a program to continue
            </p>

        </div>

        <div id="programs"></div>


    </div>




    <div id="Account_Manager">

        <h2>Account Management</h2>

        <input
            type="text"
            id="username"
            placeholder="Enter username"
        >

        <select id="programSelect"></select>

        <button id="addAccountBtn">
            Add Account
        </button>

        <h3>Account List</h3>

        <ul id="accountList"></ul>

    </div>

    <script src="SQMOStaff_land.js"></script>

</body>
</html>
