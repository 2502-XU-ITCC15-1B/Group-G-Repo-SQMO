<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report Lists</title>
<link rel="stylesheet" href="Report_Lists.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>

<body>

<div id="header">
    <img src="XU_header.png" alt="XU_Logo">
    <button id="menuBtn">☰</button>
</div>

<div class="page_name">
    <h1>Report Lists</h1>
    <p>Quality Management Office</p>
</div>

<div id="reports">

    <div id="Primary_reports">
        <button class="report_btn" data-key="leadership">
            <i class="ti ti-building-community" aria-hidden="true"></i>
            Leadership and Governance
        </button>
        <button class="report_btn" data-key="qa">
            <i class="ti ti-shield-check" aria-hidden="true"></i>
            Quality Assurance
        </button>
        <button class="report_btn" data-key="resource">
            <i class="ti ti-server" aria-hidden="true"></i>
            Resource Management
        </button>
        <button class="report_btn" data-key="teaching">
            <i class="ti ti-school" aria-hidden="true"></i>
            Teachings and Learnings
        </button>
        <button class="report_btn" data-key="student">
            <i class="ti ti-users" aria-hidden="true"></i>
            Student Service
        </button>
        <button class="report_btn" data-key="external">
            <i class="ti ti-world" aria-hidden="true"></i>
            External Relations
        </button>
        <button class="report_btn" data-key="research">
            <i class="ti ti-microscope" aria-hidden="true"></i>
            Research
        </button>
        <button class="report_btn" data-key="results">
            <i class="ti ti-chart-bar" aria-hidden="true"></i>
            Results
        </button>
    </div>

    <div id="Secondary_reports">
        <button class="ndreport_btn" data-key="appendices">
            <i class="ti ti-paperclip" aria-hidden="true"></i>
            Appendices
        </button>
        <button class="ndreport_btn" data-key="materials">
            <i class="ti ti-books" aria-hidden="true"></i>
            Other Materials
        </button>
        <button class="ndreport_btn" data-key="additional">
            <i class="ti ti-file-plus" aria-hidden="true"></i>
            Additional Documents + Requested
        </button>
        <button class="ndreport_btn" data-key="others">
            <i class="ti ti-files" aria-hidden="true"></i>
            Other Documents
        </button>
    </div>
</div>

<div id="overlay"></div>

<div id="sidebar">
    <div id="profile">
        <img src="profile.jpg">
        <h3>UserName</h3>
        <p>Accreditor/XU Admin</p>
    </div>
    <div id="menu">
        <a href="Landing_Page.html">Log out</a>
    </div>
</div>

<script src="Report_Lists.js"></script>
</body>
</html>
